on:
  pull_request_target: # Use pull_request_target
    branches: [master, beta, release]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thomasnordquist/mqtt-explorer-ui-tests:latest
      volumes:
        - ./:/app
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Install Packages
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
      - name: Test
        run: yarn test
      - name: UI-Test
        run: yarn ui-test
      - name: Post-processing
        run: ./scripts/prepareVideo.sh
      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            ./ui-test.gif
            ./ui-test.mp4
          retention-days: 30
      - name: Show Artifact Info
        run: echo "UI test artifacts uploaded successfully"
        id: artifact-upload-step
      - run: echo "📹 UI test video and GIF have been uploaded as artifacts" >> $GITHUB_STEP_SUMMARY
